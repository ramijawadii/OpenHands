[build-system]
build-backend = "poetry.core.masonry.api"
# PEP 621 project metadata (for UV compatibility)
# This section coexists with [tool.poetry] during the migration period
requires = [ "poetry-core==2.3.2" ]

[project]
name = "openhands-ai"
description = "OpenHands: Code Less, Make More"
readme = "README.md"
license = "MIT"
authors = [ { name = "OpenHands", email = "contact@all-hands.dev" } ]
requires-python = ">=3.12,<3.14"
classifiers = [
  "Programming Language :: Python :: 3 :: Only",
  "Programming Language :: Python :: 3.12",
  "Programming Language :: Python :: 3.13",
]
# Version is managed dynamically by poetry-dynamic-versioning
dynamic = [ "version" ]

# Main dependencies (mirrors [tool.poetry.dependencies] for UV compatibility)
dependencies = [
  "aiohttp==3.13.4",
  "anthropic[vertex]==0.97.0",
  "anyio==4.9.0",
  "asyncpg==0.31.0",
  "authlib==1.7.0",
  "bashlex==0.18",
  "boto3==1.42.95",
  "browsergym-core==0.13.3",
  "deprecated==1.3.1",
  "deprecation==2.1.0",
  "dirhash==0.5.0",
  "docker==7.1.0",
  "fastapi==0.136.1",
  "fastmcp==3.2.4",
  "google-api-python-client==2.194.0",
  "google-auth-httplib2==0.3.1",
  "google-auth-oauthlib==1.3.1",
  "google-cloud-aiplatform==1.148.1",
  "google-genai==1.73.1",
  "html2text==2025.4.15",
  "httpx-aiohttp==0.1.12",
  "ipywidgets==8.1.8",
  "jinja2==3.1.6",
  "joblib==1.5.3",
  "json-repair==0.59.5",
  "jupyter-kernel-gateway==3.0.1",
  "jwcrypto==1.5.7",
  "kubernetes==35.0.0",
  "libtmux==0.55.1",
  "litellm==1.83.14",
  "lmnr==0.7.51",
  "mcp==1.27.0",
  "memory-profiler==0.61.0",
  "numpy==2.4.4",
  "openai==2.24.0",
  "openhands-aci==0.3.3",
  "openhands-agent-server==1.21.1",
  "openhands-sdk==1.21.1",
  "openhands-tools==1.21.1",
  "opentelemetry-api==1.39.1",
  "opentelemetry-exporter-otlp-proto-grpc==1.39.1",
  "orjson==3.11.8",
  "pathspec==1.1.0",
  "pexpect==4.9.0",
  "pg8000==1.31.5",
  "pillow==12.2.0",
  "playwright==1.58.0",
  "poetry==2.3.4",
  "prompt-toolkit==3.0.52",
  "protobuf==5.29.6",
  "psutil==7.2.2",
  "pybase62==1.0.0",
  "pygithub==2.9.1",
  "pyjwt==2.12.1",
  "pylatexenc==2.10",
  "pypdf==6.10.2",
  "python-docx==1.2.0",
  "python-dotenv==1.2.2",
  "python-frontmatter==1.1.0",
  "python-json-logger==4.1.0",
  "python-multipart==0.0.26",
  "python-pptx==1.0.2",
  "python-socketio==5.14.0",
  "pythonnet==3.0.5; sys_platform=='win32'",
  "pyyaml==6.0.3",
  "qtconsole==5.7.2",
  "rapidfuzz==3.14.5",
  "redis==6.4.0",
  "requests==2.33.1",
  "setuptools==82.0.1",
